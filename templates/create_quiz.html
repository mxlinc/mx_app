<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Quiz</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 5px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        label .required {
            color: #e74c3c;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .question-ids-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 25px 0;
            border-left: 4px solid #667eea;
        }

        .question-ids-section h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 12px;
        }

        .question-ids-section p {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        #questionIds {
            font-family: monospace;
            font-size: 13px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #ecf0f1;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #dde2e6;
        }

        .message {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{{ url_for('lms.admin_home_new') }}" style="font-size:0.82rem;color:#6c8a9e;text-decoration:none;display:inline-block;margin-bottom:6px;">&#8592; Dashboard</a>
            <h1>Create New Quiz</h1>
            <p>Set up a new quiz by adding questions from the question bank or creating new ones</p>
        </div>

        <div id="message" class="message"></div>

        <form id="quizForm">
            <div class="form-group">
                <label for="title">Quiz Title <span class="required">*</span></label>
                <input type="text" id="title" name="title" placeholder="e.g., Algebra Basics" required>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" placeholder="Describe the quiz content and objectives..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="topic">Topic</label>
                    <input type="text" id="topic" name="topic" placeholder="e.g., Mathematics">
                </div>
                <div class="form-group">
                    <label for="subtopic">Subtopic</label>
                    <input type="text" id="subtopic" name="subtopic" placeholder="e.g., Algebra">
                </div>
            </div>

            <div class="question-ids-section">
                <h3>Add Existing Questions (Optional)</h3>
                <p>Enter comma-separated question IDs from the question bank. For example: <code>1,5,12,18</code></p>
                <textarea id="questionIds" name="questionIds" placeholder="1,5,12,18 (leave blank to add questions after creating the quiz)"></textarea>
            </div>

            <div class="button-group">
                <button type="button" class="btn btn-secondary" onclick="window.history.back()">Cancel</button>
                <button type="submit" class="btn btn-primary">
                    <span id="submitText">Create Quiz</span>
                </button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('quizForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value.trim();
            if (!title) {
                showMessage('Quiz title is required', 'error');
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Creating...';

            try {
                const response = await fetch('/quiz/create-quiz', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        title: title,
                        description: document.getElementById('description').value,
                        topic: document.getElementById('topic').value,
                        subtopic: document.getElementById('subtopic').value,
                        question_ids: document.getElementById('questionIds').value
                    })
                });

                const data = await response.json();

                if (data.ok) {
                    showMessage('Quiz created successfully! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = `/quiz/list`;
                    }, 1500);
                } else {
                    showMessage(data.error || 'Failed to create quiz', 'error');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        function showMessage(msg, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = msg;
            messageEl.className = `message ${type}`;
            if (type === 'success') {
                setTimeout(() => {
                    messageEl.className = 'message';
                }, 3000);
            }
        }
    </script>
</body>
</html>
