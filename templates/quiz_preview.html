<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ quiz.title }} - Quiz Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <!-- Include the reusable question display component -->
    {% include "quiz-question-display.html" %}

    <!-- Template-based question rendering system -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/question-templates.css') }}">
    <script src="{{ url_for('static', filename='js/question-templates.js') }}"></script>
    <script src="{{ url_for('static', filename='js/template-handlers.js') }}"></script>
    <script src="{{ url_for('static', filename='js/unified-question-component.js') }}"></script>
    <script src="{{ url_for('static', filename='js/quiz-calculator.js') }}"></script>

    <!-- Load the Quiz Controller -->
    <script src="{{ url_for('static', filename='js/quiz-controller.js') }}"></script>

    <script>
        // MathJax configuration
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: {
                fontCache: 'global'
            },
            startup: {
                pageReady: () => {
                    return Promise.resolve();
                }
            },
            options: {
                processHtmlClass: 'math'
            }
        };

        // Quiz data passed from Flask
        const quizData = {
            id: {{ quiz.id }},
            title: "{{ (quiz.quiz_code + ': ') if quiz.quiz_code else '' }}{{ quiz.title }}",
            description: "{{ quiz.description or '' }}",
            questions: {{ questions|tojson }}
        };

        // Check if in embedded mode (modal preview)
        const isEmbedded = new URLSearchParams(window.location.search).get('embedded') === 'true';

        // Initialize Quiz Controller in preview mode
        function initializeQuizPreview() {
            const controller = new QuizController({
                mode: 'preview',
                quizId: quizData.id,
                quizTitle: quizData.title,
                quizDescription: quizData.description,
                questions: quizData.questions,
                onClose: (mode) => {
                    if (isEmbedded) {
                        // Close the parent modal
                        window.parent.closePreviewModal();
                    } else {
                        window.location.href = '/quiz/list';
                    }
                }
            });
            controller.initialize();
        }

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', initializeQuizPreview);
        } else {
            initializeQuizPreview();
        }
    </script>
</body>
</html>
