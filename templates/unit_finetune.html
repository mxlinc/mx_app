<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fine Tune Assignments</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root {
      --blue:    #2c6e9e;
      --blue-lt: #d6eaf8;
      --green:   #1a7a45;
      --bg:      #f4f8fb;
      --surface: #ffffff;
      --border:  #cfe0ed;
      --text:    #1a2d3d;
      --muted:   #6c8a9e;
    }

    body { background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; color: var(--text); margin: 0; }

    /* ── Top nav ── */
    .top-nav {
      background: var(--blue);
      padding: 0.7rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .top-nav a           { color: rgba(255,255,255,0.88); text-decoration: none; font-size: 0.88rem; }
    .top-nav a:hover     { color: #fff; }
    .top-nav .brand      { font-weight: 700; font-size: 1rem; margin-right: 0.25rem; }
    .top-nav .sep        { color: rgba(255,255,255,0.4); }
    .top-nav .sign-out   { margin-left: auto; }

    /* ── Filter card ── */
    .filter-card {
      background: var(--surface);
      border-radius: 8px;
      padding: 1.4rem 1.6rem;
      box-shadow: 0 1px 5px rgba(0,0,0,0.07);
      margin-bottom: 1.5rem;
    }
    .filter-card h4 {
      margin: 0 0 1.1rem;
      color: var(--blue);
      font-weight: 700;
      font-size: 1.15rem;
    }

    /* ── Unit sections ── */
    .unit-section {
      background: var(--surface);
      border-radius: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .unit-header {
      background: #dce9f3;
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      user-select: none;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .unit-header:hover { background: #ccd9e8; }
    .unit-chevron { margin-left: auto; font-size: 0.8rem; transition: transform 0.18s; }
    .unit-section.is-collapsed .unit-chevron { transform: rotate(-90deg); }

    /* ── Work rows ── */
    .work-row {
      display: flex;
      align-items: center;
      padding: 0.42rem 1rem;
      border-top: 1px solid #f0f4f8;
      gap: 0.5rem;
      min-height: 38px;
    }
    .work-row:hover { background: #f7fbff; }

    /* ── Status action buttons (A / F / X) ── */
    .btn-st {
      width: 27px; height: 27px;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1.5px solid;
      flex-shrink: 0;
      transition: background 0.12s, color 0.12s;
      background: none;
      line-height: 1;
    }
    .btn-a-on  { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn-a-off { background: #fff; color: var(--blue); border-color: var(--blue); }
    .btn-a-on:hover  { background: #1a5276; border-color: #1a5276; }
    .btn-a-off:hover { background: var(--blue-lt); }
    .btn-f     { background: #fff; color: #6b5c00; border-color: #c9a227; }
    .btn-f:hover { background: #fffbe6; }
    .btn-x     { background: #fff; color: #a93226; border-color: #c0392b; }
    .btn-x:hover { background: #fdf0ef; }

    /* ── Item code link ── */
    .item-code {
      font-size: 0.78rem;
      color: var(--blue);
      font-weight: 600;
      text-decoration: underline;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .item-code:hover { color: #1a3f5c; }

    /* ── Item name ── */
    .item-name       { font-size: 0.88rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .item-name.video { color: #7b0000; font-weight: 700; }

    /* ── Badges ── */
    .bdg {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .bdg-assigned { background: #d6eaf8; color: #1a4f72; }
    .bdg-done     { background: #d5f5e3; color: #1a5e35; }
    .bdg-future   { background: #fef9e7; color: #7d6608; border: 1px solid #f0c040; }
    .bdg-expired  { background: #f9ebea; color: #922b21; }
    .bdg-score    { background: #d5f5e3; color: #1a5e35; }
    .bdg-views    { background: #eaf4fb; color: #2471a3; }

    .btn-right-grp { display: flex; gap: 4px; flex-shrink: 0; margin-left: auto; }
    .count-badge   { background: var(--blue); color: #fff; font-size: 0.68rem; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }

    /* ── Empty / loading states ── */
    .state-msg { text-align: center; color: var(--muted); padding: 3rem 0; font-size: 0.95rem; }
  </style>
</head>
<body>

  <nav class="top-nav">
    <a class="brand" href="/admin-new">&#127979; MathXcel Admin</a>
    <span class="sep">/</span>
    <a href="/unit/assign-finetune">Fine Tune Assignments</a>
    <a class="sign-out" href="{{ url_for('lms.logout') }}">Sign Out</a>
  </nav>

  <div style="max-width:1140px; margin:2rem auto; padding:0 1rem;">

    <!-- ── Filter card ─────────────────────────────────────────── -->
    <div class="filter-card">
      <h4>Fine Tune Work for Student</h4>
      <div class="row g-3 align-items-end">

        <!-- Student dropdown -->
        <div class="col-md-3">
          <label class="form-label fw-semibold mb-1" style="font-size:0.88rem;">Student</label>
          <select id="student-sel" class="form-select form-select-sm">
            <option value="">— Select Student —</option>
            {% for s in students %}
            <option value="{{ s.id }}">{{ s.full_name or s.username }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Status filter checkboxes -->
        <div class="col-md-6">
          <label class="form-label fw-semibold mb-1" style="font-size:0.88rem;">Show</label>
          <div class="d-flex flex-wrap gap-3 pt-1">
            <div class="form-check">
              <input class="form-check-input filter-chk" type="checkbox" value="assigned" id="chk-assigned" checked>
              <label class="form-check-label" for="chk-assigned" style="font-size:0.88rem;">Assigned</label>
            </div>
            <div class="form-check">
              <input class="form-check-input filter-chk" type="checkbox" value="done" id="chk-done" checked>
              <label class="form-check-label" for="chk-done" style="font-size:0.88rem;">Done</label>
            </div>
            <div class="form-check">
              <input class="form-check-input filter-chk" type="checkbox" value="future" id="chk-future" checked>
              <label class="form-check-label" for="chk-future" style="font-size:0.88rem;">Future</label>
            </div>
            <div class="form-check">
              <input class="form-check-input filter-chk" type="checkbox" value="expired" id="chk-expired" checked>
              <label class="form-check-label" for="chk-expired" style="font-size:0.88rem;">Expired</label>
            </div>
          </div>
        </div>

        <!-- View student page button -->
        <div class="col-md-3 text-md-end">
          <a id="btn-preview" href="#" target="_blank" rel="noopener"
             class="btn btn-sm btn-outline-primary disabled"
             style="font-size:0.85rem;">
            &#128065; View Student Page
          </a>
        </div>

      </div>
    </div>
    <!-- ── end filter card ──────────────────────────────────────── -->

    <!-- Work area -->
    <div id="work-area">
      <div class="state-msg">Select a student to view their work list.</div>
    </div>

  </div><!-- /container -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ── Constants ───────────────────────────────────────────────────────────
    const STATUS_LABEL = { assigned: 'Assigned', done: 'Done', future: 'Future', expired: 'Expired' };
    const STATUS_CLASS = { assigned: 'bdg-assigned', done: 'bdg-done', future: 'bdg-future', expired: 'bdg-expired' };

    // ── DOM refs ────────────────────────────────────────────────────────────
    const workArea   = document.getElementById('work-area');
    const studentSel = document.getElementById('student-sel');
    const btnPreview = document.getElementById('btn-preview');

    // ── Helpers ─────────────────────────────────────────────────────────────
    function activeStatuses() {
      return new Set(
        Array.from(document.querySelectorAll('.filter-chk:checked')).map(c => c.value)
      );
    }

    function statusBadge(status) {
      const lbl = STATUS_LABEL[status] || status;
      const cls = STATUS_CLASS[status] || 'bdg-assigned';
      return `<span class="bdg ${cls}">${lbl}</span>`;
    }

    function renderRow(item) {
      const isVideo    = item.item_code.startsWith('V-');
      const nameClass  = isVideo ? 'item-name video' : 'item-name';
      const linkAttrs  = item.link
        ? `href="${encodeURI(item.link)}" target="_blank" rel="noopener"`
        : 'href="#" onclick="return false;"';

      const scoreHtml = (item.score != null && item.score !== '')
        ? `<span class="bdg bdg-score ms-1">${item.score}</span>` : '';
      const viewsHtml = (item.views > 0)
        ? `<span class="bdg bdg-views ms-1">${item.views}</span>` : '';

      const aClass = item.status === 'assigned' ? 'btn-a-on' : 'btn-a-off';

      return `
      <div class="work-row" data-row-id="${item.id}" data-status="${item.status}">
        <button class="btn-st ${aClass}" title="Set Assigned"
                onclick="setStatus(${item.id}, 'assigned', this)">A</button>
        <a class="item-code" ${linkAttrs}>${item.item_code}</a>
        <span class="${nameClass}">${item.display_name}</span>
        ${statusBadge(item.status)}
        ${scoreHtml}${viewsHtml}
        <span class="btn-right-grp">
          <button class="btn-st btn-f" title="Set Future"
                  onclick="setStatus(${item.id}, 'future', this)">F</button>
          <button class="btn-st btn-x" title="Set Expired"
                  onclick="setStatus(${item.id}, 'expired', this)">X</button>
        </span>
      </div>`;
    }

    function renderUnits(units) {
      if (!units.length) {
        workArea.innerHTML = '<div class="state-msg">No work assigned to this student.</div>';
        return;
      }
      const html = units.map(unit => `
        <div class="unit-section">
          <div class="unit-header" onclick="toggleUnit(this)">
            <span>${unit.au_name}</span>
            <span class="count-badge">${unit.items.length}</span>
            <span class="unit-chevron">&#9660;</span>
          </div>
          <div class="unit-body">
            ${unit.items.map(renderRow).join('')}
          </div>
        </div>`).join('');
      workArea.innerHTML = html;
      applyFilter();
    }

    function applyFilter() {
      const active = activeStatuses();
      document.querySelectorAll('.work-row').forEach(row => {
        row.style.display = active.has(row.dataset.status) ? '' : 'none';
      });
    }

    function toggleUnit(hdr) {
      const section = hdr.closest('.unit-section');
      const body    = section.querySelector('.unit-body');
      const isOpen  = body.style.display !== 'none';
      body.style.display = isOpen ? 'none' : '';
      section.classList.toggle('is-collapsed', isOpen);
    }

    // ── Status update ───────────────────────────────────────────────────────
    async function setStatus(rowId, newStatus, _btn) {
      try {
        const res  = await fetch('/unit/api/finetune-status', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ row_id: rowId, status: newStatus })
        });
        const data = await res.json();
        if (!data.ok) { alert('Error: ' + (data.error || 'Unknown')); return; }

        // Update row DOM
        const row = document.querySelector(`.work-row[data-row-id="${rowId}"]`);
        row.dataset.status = newStatus;

        // Update status badge
        const oldBadge = row.querySelector('.bdg:not(.bdg-score):not(.bdg-views)');
        if (oldBadge) oldBadge.outerHTML = statusBadge(newStatus);

        // Update A button style
        const aBtn = row.querySelector('[title="Set Assigned"]');
        if (aBtn) aBtn.className = `btn-st ${newStatus === 'assigned' ? 'btn-a-on' : 'btn-a-off'}`;

        applyFilter();
      } catch (e) {
        alert('Network error updating status.');
      }
    }

    // ── Load work list ──────────────────────────────────────────────────────
    studentSel.addEventListener('change', async function () {
      const studentId = this.value;
      if (!studentId) {
        workArea.innerHTML = '<div class="state-msg">Select a student to view their work list.</div>';
        btnPreview.classList.add('disabled');
        btnPreview.setAttribute('href', '#');
        return;
      }

      btnPreview.setAttribute('href', `/student-new/preview/${studentId}`);
      btnPreview.classList.remove('disabled');

      workArea.innerHTML = '<div class="state-msg">Loading…</div>';
      try {
        const res  = await fetch(`/unit/api/finetune-work?student_id=${studentId}`);
        const data = await res.json();
        if (!data.ok) {
          workArea.innerHTML = `<div class="state-msg" style="color:#c0392b;">Error: ${data.error}</div>`;
          return;
        }
        renderUnits(data.units);
      } catch (e) {
        workArea.innerHTML = '<div class="state-msg" style="color:#c0392b;">Network error loading work list.</div>';
      }
    });

    // ── Filter checkboxes ───────────────────────────────────────────────────
    document.querySelectorAll('.filter-chk').forEach(chk => {
      chk.addEventListener('change', applyFilter);
    });
  </script>
</body>
</html>
