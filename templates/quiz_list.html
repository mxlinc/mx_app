<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #1e1b4b;
        }

        .header p {
            font-size: 1.1em;
            color: #666;
        }

        .filter-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-weight: 600;
            font-size: 0.9em;
            color: #333;
        }

        .filter-group select,
        .filter-group input {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
            min-width: 200px;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #4c51bf;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-search {
            background: #4c51bf;
            color: white;
        }

        .btn-search:hover {
            background: #3730a3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .btn-reset {
            background: #ecf0f1;
            color: #333;
        }

        .btn-reset:hover {
            background: #d5dbdb;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4c51bf;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .table-section {
            background: #f5f5f5;
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
        }

        .table-header {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h2 {
            font-size: 1.2em;
            color: #333;
        }

        .table-info {
            font-size: 0.9em;
            color: #666;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f8f9fa;
            border-bottom: 2px solid #e0e0e0;
        }

        th {
            padding: 15px 12px;
            text-align: left;
            font-weight: 700;
            color: #333;
            font-size: 0.9em;
        }

        td {
            padding: 15px 12px;
            border-bottom: 1px solid #ecf0f1;
            font-size: 0.95em;
        }

        tbody tr:hover {
            background: #f8f9fa;
            transition: background 0.2s;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .id-cell {
            font-weight: 600;
            color: #4c51bf;
        }

        .id-cell a {
            color: #4c51bf;
            text-decoration: none;
            cursor: pointer;
        }

        .id-cell a:hover {
            text-decoration: underline;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-draft {
            background: #fff3cd;
            color: #856404;
        }

        .status-published {
            background: #d4edda;
            color: #155724;
        }

        .actions-cell {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 6px 12px;
            font-size: 0.85em;
            border-radius: 4px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-delete-single {
            background: #f44336;
            color: white;
        }

        .btn-delete-single:hover {
            background: #da190b;
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 1.3em;
            margin-bottom: 10px;
            color: #666;
        }

        .pagination {
            padding: 20px;
            background: #f8f9fa;
            border-top: 1px solid #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .pagination-btn {
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9em;
        }

        .pagination-btn:hover:not(:disabled) {
            background: #e8e8e8;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-btn.active {
            background: #4c51bf;
            color: white;
            border-color: #4c51bf;
        }

        .pagination-info {
            margin: 0 10px;
            font-size: 0.9em;
            color: #666;
        }

        .error-message {
            background: #ffebee;
            border-left: 4px solid #f44336;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            color: #c62828;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .selection-bar {
            background: #e3f2fd;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 6px;
            display: none;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .selection-bar.show {
            display: flex;
        }

        .selection-info {
            font-weight: 600;
            color: #3730a3;
        }

        .checkbox-col {
            width: 50px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .btn-update {
            background: #4caf50;
            color: white;
        }

        .btn-update:hover {
            background: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background: #da190b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }

        .modal.show {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 5px;
        }

        .modal-header p {
            color: #666;
            font-size: 0.9em;
        }

        .close-btn {
            float: right;
            font-size: 1.5em;
            color: #999;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4c51bf;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 25px;
        }

        .btn-cancel {
            background: #ecf0f1;
            color: #333;
        }

        .btn-cancel:hover {
            background: #d5dbdb;
        }

        .btn-save {
            background: #4caf50;
            color: white;
        }

        .btn-save:hover {
            background: #45a049;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .filter-section {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-group select,
            .filter-group input {
                min-width: 100%;
            }

            .filter-buttons {
                flex-direction: column;
            }

            button {
                width: 100%;
            }

            .table-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .table-wrapper {
                font-size: 0.9em;
            }

            th, td {
                padding: 10px 8px;
            }

            .pagination {
                flex-direction: column;
                gap: 8px;
            }

            .actions-cell {
                flex-direction: column;
            }

            .action-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Quiz List</h1>
            <p>Browse and manage all quizzes</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="selection-bar" id="selectionBar">
            <div class="selection-info">
                <span id="selectedCount">0</span> quiz(zes) selected
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-update" onclick="openUpdateModal()">✏️ Update</button>
                <button class="btn-delete" onclick="deleteSelectedQuizzes()">🗑️ Delete</button>
                <button class="btn-update" onclick="openAtuModal()" style="background:#2c6e9e;">📋 Add to Unit</button>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <label for="topicFilter">Filter by Topic</label>
                <select id="topicFilter">
                    <option value="">All Topics</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="statusFilter">Filter by Status</label>
                <select id="statusFilter">
                    <option value="">All Status</option>
                    <option value="draft">Draft</option>
                    <option value="published">Published</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="titleSearch">Search by Title</label>
                <input type="text" id="titleSearch" placeholder="Search quiz title...">
            </div>
            <div class="filter-buttons">
                <button class="btn-search" onclick="loadQuizzes(1)">Search</button>
                <button class="btn-reset" onclick="resetFilters()">Reset</button>
            </div>
            <div class="filter-group" style="align-self:center;">
                <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-weight:600;font-size:0.9em;white-space:nowrap;">
                    <input type="checkbox" id="unusedFilter" checked onchange="loadQuizzes(1)" style="width:18px;height:18px;">
                    Show Unused Only
                </label>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #666;">Loading quizzes...</p>
        </div>

        <div class="table-section" id="tableSection" style="display: none;">
            <div class="table-header">
                <h2>Quizzes</h2>
                <div class="table-info">
                    <span id="recordInfo"></span>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th class="checkbox-col">
                                <input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll(this)">
                            </th>
                            <th style="width: 60px;">ID</th>
                            <th style="width: 200px;">Title</th>
                            <th style="width: 200px;">Description</th>
                            <th style="width: 120px;">Topic</th>
                            <th style="width: 120px;">Subtopic</th>
                            <th style="width: 100px;">Questions</th>
                            <th style="width: 100px;">Status</th>
                            <th style="width: 220px;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="quizzesTable">
                    </tbody>
                </table>
            </div>

            <div class="pagination" id="pagination"></div>
        </div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">📭</div>
            <h3>No quizzes found</h3>
            <p>Try adjusting your filters</p>
        </div>
    </div>

    <!-- Update Quizzes Modal -->
    <div class="modal" id="updateModal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="close-btn" onclick="closeUpdateModal()">&times;</button>
                <h2>Update Quizzes</h2>
                <p id="modalQuizzesInfo"></p>
            </div>
            <form onsubmit="submitUpdate(event)">
                <div class="form-group">
                    <label for="updateTopic">Topic</label>
                    <input type="text" id="updateTopic" placeholder="Leave empty to keep current">
                </div>
                <div class="form-group">
                    <label for="updateSubtopic">Subtopic</label>
                    <input type="text" id="updateSubtopic" placeholder="Leave empty to keep current">
                </div>
                <div class="form-group">
                    <label for="updateLevel">Level</label>
                    <select id="updateLevel">
                        <option value="">Keep Current</option>
                        <option value="Easy">Easy</option>
                        <option value="Medium">Medium</option>
                        <option value="Hard">Hard</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeUpdateModal()">Cancel</button>
                    <button type="submit" class="btn-save">Update</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentPage = 1;
        let totalPages = 1;
        let selectedQuizzes = new Set();
        let isLoadingPage = false;

        document.addEventListener('DOMContentLoaded', function() {
            loadTopics();
            loadQuizzes(1);
        });

        function loadTopics() {
            fetch('/quiz/api/topics')
                .then(response => response.json())
                .then(data => {
                    if (data.ok) {
                        const select = document.getElementById('topicFilter');
                        const currentValue = select.value;
                        
                        while (select.options.length > 1) {
                            select.remove(1);
                        }
                        
                        data.topics.forEach(topic => {
                            const option = document.createElement('option');
                            option.value = topic;
                            option.textContent = topic;
                            select.appendChild(option);
                        });
                        
                        select.value = currentValue;
                    }
                })
                .catch(error => {
                    console.error('Error loading topics:', error);
                    showError('Failed to load topics');
                });
        }

        function loadQuizzes(page) {
            currentPage = page;
            const topic = document.getElementById('topicFilter').value;
            const status = document.getElementById('statusFilter').value;
            const title = document.getElementById('titleSearch').value;
            const unused = document.getElementById('unusedFilter').checked;
            
            showLoading(true);
            hideError();
            isLoadingPage = true;

            let url = `/quiz/api/quizzes-page?page=${page}`;
            if (topic) url += `&topic=${encodeURIComponent(topic)}`;
            if (status) url += `&status=${encodeURIComponent(status)}`;
            if (title) url += `&title=${encodeURIComponent(title)}`;
            if (unused) url += `&unused=1`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    showLoading(false);
                    
                    if (data.ok) {
                        if (data.items.length === 0) {
                            showEmptyState();
                        } else {
                            renderTable(data);
                            renderPagination(data);
                            document.getElementById('tableSection').style.display = 'block';
                            document.getElementById('emptyState').style.display = 'none';
                            
                            const start = (page - 1) * 50 + 1;
                            const end = Math.min(page * 50, data.total);
                            document.getElementById('recordInfo').textContent = 
                                `Showing ${start} to ${end} of ${data.total} quizzes`;
                        }
                    } else {
                        showError(data.error || 'Failed to load quizzes');
                    }
                    
                    isLoadingPage = false;
                })
                .catch(error => {
                    showLoading(false);
                    console.error('Error:', error);
                    showError('Failed to load quizzes. Please try again.');
                    isLoadingPage = false;
                });
        }

        function renderTable(data) {
            const tbody = document.getElementById('quizzesTable');
            tbody.innerHTML = '';

            data.items.forEach(quiz => {
                const row = document.createElement('tr');
                
                const statusBadge = `<span class="status-badge status-${quiz.status.toLowerCase()}">${quiz.status}</span>`;
                const isSelected = selectedQuizzes.has(quiz.id);
                
                row.innerHTML = `
                    <td class="checkbox-col">
                        <input type="checkbox" 
                               value="${quiz.id}"
                               data-code="${quiz.quiz_code || ''}"
                               ${isSelected ? 'checked' : ''} 
                               onchange="updateSelectedQuizzes()">
                    </td>
                    <td class="id-cell"><a href="/question/list?ids=${encodeURIComponent(quiz.question_ids)}" title="View questions in this quiz">${quiz.id}</a></td>
                    <td><strong>${quiz.quiz_code ? quiz.quiz_code + ': ' : ''}${quiz.title}</strong></td>
                    <td>${quiz.description}</td>
                    <td>${quiz.topic}</td>
                    <td>${quiz.subtopic}</td>
                    <td>${quiz.question_count}</td>
                    <td>${statusBadge}</td>
                    <td class="actions-cell">
                        <a href="/quiz/${quiz.id}/preview" class="action-btn" target="_blank" title="Preview">Preview</a>
                        <button class="action-btn btn-delete-single" onclick="deleteSingleQuiz(${quiz.id})" title="Delete">Delete</button>
                    </td>
                `;
                
                tbody.appendChild(row);
            });
            
            setTimeout(() => {
                if (window.MathJax && window.MathJax.typesetPromise) {
                    MathJax.typesetPromise().catch(err => console.log('MathJax error:', err));
                }
            }, 50);
            
            console.log('Table rendered');
        }

        function updateSelectedQuizzes() {
            if (isLoadingPage) return;
            
            selectedQuizzes.clear();
            const checkboxes = document.querySelectorAll('#quizzesTable input[type="checkbox"]');
            checkboxes.forEach(checkbox => {
                if (checkbox.checked) {
                    selectedQuizzes.add(parseInt(checkbox.value));
                }
            });
            
            updateSelectionUI();
        }

        function toggleSelectAll(checkbox) {
            const checkboxes = document.querySelectorAll('#quizzesTable input[type="checkbox"]');
            checkboxes.forEach(cb => {
                cb.checked = checkbox.checked;
            });
            updateSelectedQuizzes();
        }

        function updateSelectionUI() {
            const count = selectedQuizzes.size;
            const selectionBar = document.getElementById('selectionBar');
            
            if (count === 0) {
                selectionBar.classList.remove('show');
                document.getElementById('selectAllCheckbox').checked = false;
            } else {
                selectionBar.classList.add('show');
                document.getElementById('selectedCount').textContent = count;
            }
        }

        function openUpdateModal() {
            if (selectedQuizzes.size === 0) {
                showError('Please select at least one quiz');
                return;
            }
            
            document.getElementById('modalQuizzesInfo').textContent = 
                `Updating ${selectedQuizzes.size} quiz(zes)`;
            document.getElementById('updateModal').classList.add('show');
        }

        function closeUpdateModal() {
            document.getElementById('updateModal').classList.remove('show');
            document.getElementById('updateTopic').value = '';
            document.getElementById('updateSubtopic').value = '';
            document.getElementById('updateLevel').value = '';
        }

        function submitUpdate(event) {
            event.preventDefault();
            
            const data = {
                quiz_ids: Array.from(selectedQuizzes),
                topic: document.getElementById('updateTopic').value.trim() || null,
                subtopic: document.getElementById('updateSubtopic').value.trim() || null,
                level: document.getElementById('updateLevel').value || null
            };
            
            const submitBtn = event.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = 'Updating...';
            submitBtn.disabled = true;
            
            fetch('/quiz/api/update-quizzes', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
                
                if (result.ok) {
                    closeUpdateModal();
                    showError(`✓ Successfully updated ${result.updated_count} quiz(zes) and their questions`);
                    selectedQuizzes.clear();
                    updateSelectionUI();
                    setTimeout(() => {
                        loadQuizzes(currentPage);
                    }, 1000);
                } else {
                    showError(result.error || 'Failed to update quizzes');
                }
            })
            .catch(error => {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
                console.error('Error:', error);
                showError('Failed to update quizzes. Please try again.');
            });
        }

        function deleteSelectedQuizzes() {
            if (selectedQuizzes.size === 0) {
                showError('Please select at least one quiz');
                return;
            }
            
            const count = selectedQuizzes.size;
            const message = count === 1 
                ? 'Are you sure you want to delete this quiz? This action cannot be undone.'
                : `Are you sure you want to delete ${count} quizzes? This action cannot be undone.`;
            
            if (!confirm(message)) {
                return;
            }
            
            const data = {
                quiz_ids: Array.from(selectedQuizzes)
            };
            
            fetch('/quiz/api/delete-quizzes', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.ok) {
                    showError(`✓ Successfully deleted ${result.deleted_count} quiz(zes)`);
                    selectedQuizzes.clear();
                    updateSelectionUI();
                    setTimeout(() => {
                        loadQuizzes(currentPage);
                    }, 1000);
                } else {
                    showError(result.error || 'Failed to delete quizzes');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showError('Failed to delete quizzes. Please try again.');
            });
        }

        function deleteSingleQuiz(quizId) {
            if (!confirm('Delete this quiz? This action cannot be undone.')) return;
            
            fetch('/quiz/api/delete-quizzes', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ quiz_ids: [quizId] })
            })
            .then(response => response.json())
            .then(result => {
                if (result.ok) {
                    showError(`✓ Quiz deleted successfully`);
                    setTimeout(() => {
                        loadQuizzes(currentPage);
                    }, 1000);
                } else {
                    showError(result.error || 'Failed to delete quiz');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showError('Failed to delete quiz. Please try again.');
            });
        }

        function renderPagination(data) {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            totalPages = data.pages;

            if (data.pages === 1) {
                pagination.innerHTML = `<div class="pagination-info">1 page</div>`;
                return;
            }

            const prevBtn = document.createElement('button');
            prevBtn.className = 'pagination-btn';
            prevBtn.textContent = '← Previous';
            prevBtn.disabled = !data.has_prev;
            prevBtn.onclick = () => loadQuizzes(currentPage - 1);
            pagination.appendChild(prevBtn);

            pagination.appendChild(createPaginationInfo());

            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(data.pages, currentPage + 2);

            if (startPage > 1) {
                const firstBtn = createPageButton(1, 1 === currentPage);
                pagination.appendChild(firstBtn);
                
                if (startPage > 2) {
                    const dots = document.createElement('span');
                    dots.className = 'pagination-info';
                    dots.textContent = '...';
                    pagination.appendChild(dots);
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                const btn = createPageButton(i, i === currentPage);
                pagination.appendChild(btn);
            }

            if (endPage < data.pages) {
                if (endPage < data.pages - 1) {
                    const dots = document.createElement('span');
                    dots.className = 'pagination-info';
                    dots.textContent = '...';
                    pagination.appendChild(dots);
                }
                
                const lastBtn = createPageButton(data.pages, data.pages === currentPage);
                pagination.appendChild(lastBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = 'pagination-btn';
            nextBtn.textContent = 'Next →';
            nextBtn.disabled = !data.has_next;
            nextBtn.onclick = () => loadQuizzes(currentPage + 1);
            pagination.appendChild(nextBtn);
        }

        function createPageButton(pageNum, isActive) {
            const btn = document.createElement('button');
            btn.className = `pagination-btn ${isActive ? 'active' : ''}`;
            btn.textContent = pageNum;
            btn.onclick = () => loadQuizzes(pageNum);
            return btn;
        }

        function createPaginationInfo() {
            const info = document.createElement('div');
            info.className = 'pagination-info';
            info.textContent = `Page ${currentPage} of ${totalPages}`;
            return info;
        }

        function resetFilters() {
            document.getElementById('topicFilter').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('titleSearch').value = '';
            document.getElementById('unusedFilter').checked = true;
            loadQuizzes(1);
        }

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
        }

        function showEmptyState() {
            document.getElementById('tableSection').style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
            showLoading(false);
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        window.onclick = function(event) {
            const updateModal = document.getElementById('updateModal');
            if (event.target === updateModal) {
                closeUpdateModal();
            }
        }

        // ── Add-to-Unit modal ────────────────────────────────────────
        let atuUnitsData = [];

        function openAtuModal() {
            const checkboxes = document.querySelectorAll('#quizzesTable input[type="checkbox"]:checked');
            const codes = [...checkboxes].map(cb => cb.dataset.code).filter(Boolean);
            if (!codes.length) { showError('No quiz codes available — ensure quizzes have quiz_code set.'); return; }

            document.getElementById('atu-selected-list').textContent = codes.join(', ');
            document.getElementById('atu-area').innerHTML = '<option value="">— select area —</option>';
            document.getElementById('atu-unit').innerHTML = '<option value="">— select unit —</option>';
            document.getElementById('atu-existing-wrap').style.display = 'none';
            document.getElementById('atu-error').style.display = 'none';
            atuSetSaveEnabled(false);
            atuUnitsData = [];

            fetch('/units/options')
                .then(r => r.json())
                .then(data => {
                    const sel = document.getElementById('atu-area');
                    (data.areas || []).forEach(a => {
                        const o = document.createElement('option');
                        o.value = o.textContent = a;
                        sel.appendChild(o);
                    });
                });

            document.getElementById('atu-backdrop').style.display = 'block';
            document.getElementById('atu-modal').style.display = 'block';
        }

        function atuLoadUnits() {
            const area = document.getElementById('atu-area').value;
            const unitSel = document.getElementById('atu-unit');
            unitSel.innerHTML = '<option value="">— select unit —</option>';
            document.getElementById('atu-existing-wrap').style.display = 'none';
            atuSetSaveEnabled(false);
            atuUnitsData = [];
            if (!area) return;
            fetch('/units/by-area?area=' + encodeURIComponent(area))
                .then(r => r.json())
                .then(data => {
                    atuUnitsData = data.units || [];
                    atuUnitsData.forEach(u => {
                        const o = document.createElement('option');
                        o.value = u.au_id;
                        o.textContent = u.au_name;
                        unitSel.appendChild(o);
                    });
                });
        }

        function atuShowContent() {
            const auId = document.getElementById('atu-unit').value;
            const wrap = document.getElementById('atu-existing-wrap');
            if (!auId) { wrap.style.display = 'none'; atuSetSaveEnabled(false); return; }
            const unit = atuUnitsData.find(u => String(u.au_id) === String(auId));
            if (unit) {
                document.getElementById('atu-existing').textContent = unit.au_content || '(empty)';
                wrap.style.display = 'block';
                atuSetSaveEnabled(true);
            }
        }

        function atuSetSaveEnabled(enabled) {
            const btn = document.getElementById('atu-save-btn');
            btn.disabled = !enabled;
            btn.style.opacity = enabled ? '1' : '0.6';
        }

        function atuClose() {
            document.getElementById('atu-backdrop').style.display = 'none';
            document.getElementById('atu-modal').style.display = 'none';
        }

        function atuSave() {
            const auId = document.getElementById('atu-unit').value;
            if (!auId) return;
            const codes = [...document.querySelectorAll('#quizzesTable input[type="checkbox"]:checked')]
                            .map(cb => cb.dataset.code).filter(Boolean);
            const btn = document.getElementById('atu-save-btn');
            btn.disabled = true;
            btn.textContent = 'Saving…';

            fetch('/units/add-videos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ au_id: parseInt(auId), codes })
            })
            .then(r => r.json())
            .then(data => {
                if (data.ok) {
                    atuClose();
                } else {
                    const errEl = document.getElementById('atu-error');
                    errEl.textContent = data.error || 'An error occurred.';
                    errEl.style.display = 'block';
                }
            })
            .catch(() => {
                const errEl = document.getElementById('atu-error');
                errEl.textContent = 'Network error. Please try again.';
                errEl.style.display = 'block';
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = 'Add to Unit';
                atuSetSaveEnabled(true);
            });
        }

        document.getElementById('atu-backdrop').addEventListener('click', atuClose);
    </script>

  <!-- Add-to-Unit Modal -->
  <div id="atu-backdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1040;"></div>
  <div id="atu-modal" role="dialog" aria-modal="true" aria-labelledby="atu-title"
       style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
              background:#fff;border-radius:10px;padding:2rem;width:min(520px,95vw);
              box-shadow:0 8px 32px rgba(0,0,0,0.18);z-index:1050;font-family:'Segoe UI',system-ui,sans-serif;">
    <h2 id="atu-title" style="font-size:1.15rem;font-weight:600;color:#2c6e9e;margin:0 0 1.25rem;">
      Add to Assignment Unit
    </h2>
    <div id="atu-error" style="display:none;color:#c0392b;font-size:0.88rem;margin-bottom:0.75rem;"></div>

    <div style="margin-bottom:1rem;background:#d6eaf8;border-radius:6px;padding:0.65rem 0.85rem;font-size:0.88rem;">
      <strong>Selected:</strong> <span id="atu-selected-list"></span>
    </div>

    <div style="margin-bottom:1rem;">
      <label style="font-size:0.88rem;font-weight:600;display:block;margin-bottom:0.3rem;">Area</label>
      <select id="atu-area" onchange="atuLoadUnits()"
              style="width:100%;padding:0.55rem 0.75rem;border:1.5px solid #cfe0ed;border-radius:6px;font-size:0.95rem;">
        <option value="">— select area —</option>
      </select>
    </div>

    <div style="margin-bottom:0.75rem;">
      <label style="font-size:0.88rem;font-weight:600;display:block;margin-bottom:0.3rem;">Unit</label>
      <select id="atu-unit" onchange="atuShowContent()"
              style="width:100%;padding:0.55rem 0.75rem;border:1.5px solid #cfe0ed;border-radius:6px;font-size:0.95rem;">
        <option value="">— select unit —</option>
      </select>
    </div>

    <div id="atu-existing-wrap" style="display:none;margin-bottom:1.25rem;font-size:0.85rem;color:#6c8a9e;">
      <strong>Current content:</strong>
      <div id="atu-existing" style="margin-top:0.3rem;word-break:break-all;"></div>
    </div>

    <div style="display:flex;justify-content:flex-end;gap:0.75rem;">
      <button onclick="atuClose()"
              style="padding:0.5rem 1.25rem;border:1px solid #cfe0ed;border-radius:6px;background:#fff;cursor:pointer;font-size:0.95rem;">
        Cancel
      </button>
      <button id="atu-save-btn" onclick="atuSave()" disabled
              style="padding:0.5rem 1.25rem;border:none;border-radius:6px;background:#2c6e9e;color:#fff;font-weight:600;cursor:pointer;font-size:0.95rem;opacity:0.6;">
        Add to Unit
      </button>
    </div>
  </div>
</body>
</html>
