<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ (quiz.quiz_code + ': ') if quiz.quiz_code else '' }}{{ quiz.title }} - Quiz</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/question-templates.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: #FFFFFF; color: #1a1a1a; }
    </style>
</head>
<body>
    {% include "quiz-question-display.html" %}

    <script defer src="{{ url_for('static', filename='js/question-templates.js') }}"></script>
    <script defer src="{{ url_for('static', filename='js/template-handlers.js') }}"></script>
    <script defer src="{{ url_for('static', filename='js/unified-question-component.js') }}"></script>
    <script defer src="{{ url_for('static', filename='js/quiz-calculator.js') }}"></script>
    <script defer src="{{ url_for('static', filename='js/quiz-controller.js') }}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            new QuizController({
                mode:            'execution',
                userId:          {{ user_id }},
                quizId:          {{ quiz.id }},
                questions:       {{ questions|tojson }},
                startingIndex:   {{ starting_index }},
                answeredIds:     {{ answered_question_ids|tojson }},
                alreadyComplete: {{ 'true' if already_complete else 'false' }},
                initialStreak:   {{ initial_streak }},
            }).initialize();
        });
    </script>
</body>
</html>
