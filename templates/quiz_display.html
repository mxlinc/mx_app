
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQ Question Display</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Merriweather:wght@400;700&family=Lora:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: #1a1a1a;
        }

        .top-band {
            background: #1e3a5f;
            color: #FFFFFF;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            flex-shrink: 0;
            z-index: 100;
        }

        #quizBanner {
            display: none;
            background: #37474f;
            color: #eceff1;
            padding: 7px 20px;
            font-size: 0.88em;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        #quizBanner.show { display: flex; }
        #quizBanner .qb-title { font-weight: 600; }
        #quizBanner .qb-progress { color: #b0bec5; margin-left: 6px; }
        #quizBanner .qb-exit {
            margin-left: auto;
            color: #ef9a9a;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9em;
        }
        #quizBanner .qb-exit:hover { color: #fff; }

        .top-band .id-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .delete-btn {
            color: white;
            font-size: 0.88em;
            padding: 5px 11px;
            border-radius: 4px;
            transition: all 0.3s;
            background: #dc2626;
            border: 1px solid #b91c1c;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }
        .delete-btn:hover {
            background: #b91c1c;
            border-color: #991b1b;
        }

        .top-band .id-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .top-band .id-value {
            font-size: 1.1em;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 10px;
            border-radius: 4px;
        }

        .top-band .links {
            display: flex;
            gap: 15px;
        }

        .top-band a {
            color: white;
            text-decoration: none;
            font-size: 0.95em;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .top-band a:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        .next-question-btn {
            color: white;
            text-decoration: none;
            font-size: 0.95em;
            padding: 6px 12px;
            border-radius: 4px;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
        }

        .next-question-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }

        .container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 4px;
            opacity: 0;
            transition: opacity 0.3s ease-in;
        }

        .container.loaded {
            opacity: 1;
        }

        .question-block {
            background: #FFFFFF;
            border-radius: 0;
            box-shadow: none;
            border: none;
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        /* === Three-Section Layout === */
        /* Section 1: Question Stem */
        .qa-grid {
            display: flex;
            flex-direction: column;
            padding: 32px 40px;
            gap: 0;
        }

        .qa-left {
            display: flex;
            flex-direction: column;
            gap: 0;
            flex-shrink: 0;
        }

        .stem-band {
            background: transparent;
            padding: 0;
            border-radius: 0;
            width: 100%;
            margin-bottom: 20px;
            padding-bottom: 0;
            flex-shrink: 0;
        }

        /* Section 2: Image (if present) */
        .question-image {
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .question-image img {
            max-width: 100%;
            object-fit: contain;
            border-radius: 6px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        }

        /* Question stem styling */
        .question-stem {
            font-size: clamp(1.05em, 2.5vw, 1.25em);
            font-weight: 500;
            color: #1a1a1a;
            line-height: 1.7;
            flex-shrink: 0;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            width: 100%;
            font-family: 'Lora', 'Merriweather', serif;
            margin: 0;
            padding: 0;
        }

        /* Section 3: Options/Answer Area (takes remaining space) */
        .options-band {
            background: transparent;
            padding: 0;
            border-radius: 0;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            margin-top: auto;
        }

        .options-section {
            margin: 0;
            padding-left: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .options-section::-webkit-scrollbar {
            width: 6px;
        }

        .options-section::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 3px;
        }

        .options-section::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        .options-section::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        .option {
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .option input[type="radio"] {
            width: 20px;
            height: 20px;
            margin-top: 3px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .option label {
            flex: 1;
            font-size: clamp(0.9em, 2vw, 1.05em);
            color: #1a1a1a;
            cursor: pointer;
            padding: 12px 10px;
            border-radius: 4px;
            transition: background 0.3s;
            display: block;
            line-height: 1.6;
            font-family: 'Lora', 'Merriweather', serif;
        }

        .option:hover label {
            background: #f5f5f5;
        }

        .option input[type="radio"]:checked + label {
            background: #e0e7ff;
            font-weight: 600;
        }

        /* Correct option styling */
        .option.correct-option label {
            color: #1b5e20;
            background: #c8e6c9;
            font-weight: 700;
            border: 2px solid #4caf50;
        }

        /* Incorrect option styling */
        .option.incorrect-option label {
            color: #b71c1c;
            background: #ffcdd2;
            font-weight: 700;
            border: 2px solid #f44336;
        }

        /* FILL question styling */
        .blank-input {
            border: 1.5px solid #999 !important;
            border-radius: 4px !important;
            padding: 8px 10px !important;
            font-size: 0.95em !important;
            transition: border-color 0.3s, box-shadow 0.3s !important;
            font-family: inherit !important;
        }

        .blank-input:focus {
            outline: none;
            border-color: #163058 !important;
            box-shadow: 0 0 0 3px rgba(27, 58, 111, 0.1) !important;
        }

        /* Correct blank input styling */
        .blank-input.correct-answer {
            background: #c8e6c9 !important;
            border: 2px solid #4caf50 !important;
            color: #1b5e20 !important;
            font-weight: 700 !important;
        }

        /* Incorrect blank input styling */
        .blank-input.incorrect-answer {
            background: #ffcdd2 !important;
            border: 2px solid #f44336 !important;
            color: #b71c1c !important;
            font-weight: 700 !important;
        }

        /* Correct FEVAL input styling */
        .feval-input.correct-answer {
            background: #c8e6c9 !important;
            border: 2px solid #4caf50 !important;
            color: #1b5e20 !important;
            font-weight: 700 !important;
        }

        /* Incorrect FEVAL input styling */
        .feval-input.incorrect-answer {
            background: #ffcdd2 !important;
            border: 2px solid #f44336 !important;
            color: #b71c1c !important;
            font-weight: 700 !important;
        }

        .feedback {
            margin: 8px 0 0 0;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: clamp(0.9em, 2vw, 1em);
            font-weight: 600;
            display: none;
            max-height: 15vh;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .button-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 16px;
            padding: 12px 32px;
            background: #F5F5F3;
            border-top: 1px solid #E5E5E0;
            flex-shrink: 0;
            z-index: 50;
            width: 100%;
            max-width: 900px;
            margin: 0 auto 12px auto;
            box-sizing: border-box;
        }

        .question-counter {
            font-size: 0.9em;
            color: #666;
            white-space: nowrap;
            flex-shrink: 0;
            line-height: 1;
        }

        .submit-button {
            padding: 14px 36px;
            font-size: clamp(0.9em, 1.5vw, 1em);
            font-weight: 600;
            background: #1e4080;
            color: #FFFFFF;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            flex-shrink: 0;
            white-space: nowrap;
            line-height: 1;
            margin: 0;
            box-shadow: 0 2px 8px rgba(74, 111, 165, 0.2);
            letter-spacing: 0.5px;
        }

        .submit-button:hover {
            background: #163058;
            box-shadow: 0 4px 12px rgba(74, 111, 165, 0.3);
            transform: translateY(-1px);
        }

        .submit-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .math {
            white-space: pre-wrap;
        }

        .math-frac {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.98em;
            margin: 0 0.15em;
            line-height: 1;
        }

        .math-num,
        .math-den {
            display: block;
            padding: 0 0.2em;
        }

        .math-den {
            border-top: 1px solid #333;
        }

        .json-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .json-modal.show {
            display: flex;
        }

        .json-modal-content {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        .json-modal-header {
            padding: 16px 20px;
            background: #f4f7fb;
            border-bottom: 1px solid #e1e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .json-modal-header h2 {
            font-size: 1.1em;
            margin: 0;
            color: #163058;
        }

        .json-modal-close {
            border: none;
            background: transparent;
            font-size: 1.5em;
            cursor: pointer;
            color: #333;
        }

        .json-modal-body {
            padding: 20px;
            overflow-y: auto;
        }

        .json-modal-body pre {
            white-space: pre-wrap;
            word-break: break-word;
            font-size: 0.9em;
            line-height: 1.4;
            margin: 0;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
        }

        .json-key {
            color: #0077cc;
            font-weight: 600;
        }

        .json-string {
            color: #165e2a;
        }

        .json-number {
            color: #d73a01;
        }

        .json-boolean {
            color: #d73a01;
            font-weight: 600;
        }

        .json-null {
            color: #999;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .top-band {
                flex-direction: column;
                gap: 8px;
                padding: 8px 12px;
            }

            .top-band .id-section {
                width: 100%;
                font-size: 0.9em;
            }

            .top-band .links {
                width: 100%;
                justify-content: space-around;
                gap: 8px;
            }

            .top-band a {
                font-size: clamp(0.8em, 2vw, 0.9em);
                padding: 4px 8px;
            }

            .options-section {
                display: flex;
                flex-direction: column;
                gap: 8px;
                overflow-y: visible;
                max-height: none;
                padding-left: 20px;
            }

            .options-band {
                flex: auto;
                display: flex;
                flex-direction: column;
                min-height: auto;
                justify-content: flex-start;
            }

            .qa-grid {
                padding: 12px 10px;
            }

            .question-block {
                max-height: 100%;
            }
        }

        @media (min-width: 1024px) {
            .qa-grid {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }
            .qa-left {
                display: flex;
                flex-direction: column;
                gap: 16px;
            }
            .qa-right {
                display: flex;
                flex-direction: column;
                gap: 0;
            }
            .options-section {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                overflow-y: visible;
                margin: 0;
            }
            .qa-grid.no-image {
                flex: 0 0 auto;
                margin: auto;
                display: flex;
                flex-direction: column;
                gap: 0;
                align-items: flex-start;
                width: 100%;
                max-width: 600px;
            }
            .qa-grid.no-image .qa-left {
                width: 100%;
                max-width: 600px;
                flex-shrink: 0;
            }
            .qa-grid.no-image .stem-band {
                padding: 20px;
                border-radius: 0;
                background: transparent;
                margin-bottom: 0;
            }
            .qa-grid.no-image .question-stem {
                text-align: left;
            }
            .qa-grid.no-image .qa-right {
                width: 100%;
                max-width: 600px;
                flex: 0;
                min-height: 0;
            }
            .qa-grid.no-image .options-band {
                background: transparent;
                padding: 0 20px 20px 20px;
                border-radius: 0;
            }
            .qa-grid.no-image .options-section {
                grid-template-columns: 1fr;
                padding-left: 0;
                display: flex;
                flex-direction: column;
                gap: 8px;
                overflow-y: visible;
                max-height: none;
                margin: 0;
            }
            .option {
                margin-bottom: 0;
            }
        }


    /* ── Calculator modal container ─────────────────────────────────────────── */
    #calcContainer {
        background: #1e2a3a;
        border-radius: 12px;
        width: 320px;
        box-shadow: 0 8px 36px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        font-family: 'Poppins', sans-serif;
    }

    .calc-titlebar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 14px;
        background: #162233;
        color: #ffffff;
        font-size: 0.82em;
        font-weight: 600;
        letter-spacing: 0.02em;
    }

    .calc-x {
        background: none;
        border: none;
        color: #8a9ab0;
        cursor: pointer;
        font-size: 0.95em;
        padding: 2px 4px;
        line-height: 1;
        border-radius: 4px;
        transition: color 0.15s;
    }
    .calc-x:hover { color: #ffffff; background: rgba(255,255,255,0.1); }

    .calc-display-wrap {
        background: #0f1923;
        padding: 10px 14px 8px;
        text-align: right;
        min-height: 52px;
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        overflow: hidden;
    }

    .calc-display {
        color: #ffffff;
        font-size: 1.9em;
        font-weight: 300;
        word-break: break-all;
        line-height: 1.15;
        max-width: 100%;
    }

    .calc-pad {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1px;
        background: #0a1018;
    }

    .calc-btn {
        background: #1e2d3e;
        color: #e8eef4;
        border: none;
        padding: 13px 6px;
        font-size: 0.93em;
        font-family: 'Poppins', sans-serif;
        cursor: pointer;
        transition: background 0.12s;
        text-align: center;
        user-select: none;
    }
    .calc-btn:hover  { background: #27394d; }
    .calc-btn:active { background: #0f1923; }

    .calc-btn.calc-fn {
        background: #1a2d40;
        color: #b8cfe0;
        font-size: 0.76em;
    }
    .calc-btn.calc-fn:hover { background: #233a52; }

    .calc-btn.calc-op {
        background: #2c6e9e;
        color: #ffffff;
        font-size: 1.05em;
        font-weight: 600;
    }
    .calc-btn.calc-op:hover { background: #3a85b8; }

    .calc-btn.calc-toggle {
        background: #1d4f6a;
        color: #7ecfef;
        font-size: 0.74em;
        font-weight: 700;
        letter-spacing: 0.05em;
    }
    .calc-btn.calc-toggle:hover { background: #256080; }

    </style>
</head>
<body>
    <div class="top-band">
        <div class="id-section">
            <span class="id-label">Question ID:</span>
            <span class="id-value" id="questionId">{{ question_id }}</span>
            <button class="next-question-btn" id="adminCalcBtn">&#128425; Calculator</button>
            <button class="delete-btn" id="deleteBtn">&#128465; Delete</button>
            <a href="{{ url_for('lms.admin_home_new') }}">&#8592; Dashboard</a>
            <a href="#" id="jsonLink">JSON</a>
        </div>
        <div class="links">
            <a href="{{ url_for('question.list_questions_page') }}">&#8592; List</a>
            <a href="#" id="editLink">Edit</a>
            <a href="#" id="duplicateLink">Duplicate</a>
            <a href="#" id="newLink">New</a>
            <a href="#" id="nextTopLink" style="display:none">Next</a>
        </div>
    </div>

    <div id="quizBanner">
        <span>&#x1F4CB;</span>
        <span class="qb-title" id="quizBannerTitle"></span>
        <span class="qb-progress" id="quizBannerProgress"></span>
        <a class="qb-exit" href="/quiz/list">&#x2715; Exit quiz</a>
    </div>

    <div class="container">
        <div class="question-block" id="questionContainer">
            <!-- Template questions will be injected here -->
        </div>
    </div>

    <!-- Bottom Action Bar -->
    <div class="button-row">
        <button class="submit-button" id="submitBtn">SUBMIT</button>
    </div>

    <!-- Calculator Modal -->
    <div id="calcModal" style="display:none; position:fixed; inset:0; z-index:2000;
         align-items:center; justify-content:center; background:rgba(0,0,0,0.45);">
        <div id="calcContainer"></div>
    </div>

    <!-- Delete Warning Modal -->
    <div class="json-modal" id="deleteWarnModal">
        <div class="json-modal-content" style="max-width:480px;">
            <div class="json-modal-header" style="background:#c0392b;">
                <h2 style="color:#fff;">&#x26D4; Cannot Delete Question</h2>
                <button class="json-modal-close" onclick="document.getElementById('deleteWarnModal').classList.remove('show')">&#xd7;</button>
            </div>
            <div class="json-modal-body" style="padding:20px 24px;">
                <p id="deleteWarnMsg" style="white-space:pre-line;line-height:1.6;margin:0;"></p>
            </div>
            <div style="padding:12px 24px 20px;text-align:right;">
                <button class="json-modal-close" style="padding:8px 20px;background:#c0392b;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.95em;"
                        onclick="document.getElementById('deleteWarnModal').classList.remove('show')">Close</button>
            </div>
        </div>
    </div>

    <!-- JSON Modal -->
    <div class="json-modal" id="jsonModal">
        <div class="json-modal-content">
            <div class="json-modal-header">
                <h2>Question JSON Schema</h2>
                <button class="json-modal-close" id="closeJsonBtn">×</button>
            </div>
            <div class="json-modal-body">
                <pre id="jsonContent"></pre>
            </div>
        </div>
    </div>

    <!-- Template-based question rendering system -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/question-templates.css') }}">
    <!-- Override: force image to exactly 30vh so zoom works on both small and large images -->
    <style>
        .question-block .template-image {
            height: 30vh;
            overflow: visible;
            flex-shrink: 0;
            cursor: zoom-in;
            transition: height 0.3s ease;
            display: inline-flex;
            align-items: center;
        }
        .question-block .template-image.img-expanded {
            height: 75vh;
            cursor: zoom-out;
        }
        .question-block .template-image img {
            height: 100%;
            width: auto;
            max-width: 100%;
            object-fit: contain;
        }
    </style>
    <script src="{{ url_for('static', filename='js/question-templates.js') }}"></script>
    <script src="{{ url_for('static', filename='js/template-handlers.js') }}"></script>
    <script src="{{ url_for('static', filename='js/unified-question-component.js') }}"></script>
    <script src="{{ url_for('static', filename='js/quiz-calculator.js') }}"></script>

    <!-- Common quiz utilities -->
    <script src="{{ url_for('static', filename='js/quiz-common.js') }}"></script>

    <script>
        /**
         * Unified Question Display
         * Uses template-based rendering for consistent display across all contexts
         */

        // ── Quiz-mode state ──────────────────────────────────────────────
        window._quizMode = null; // { quizId, quizCode, title, ids:[], total }

        async function _initQuizMode() {
            const quizId = new URLSearchParams(location.search).get('quiz_id');
            if (!quizId) return;
            try {
                const res = await fetch(`/quiz/api/${quizId}`);
                const data = await res.json();
                if (!data.ok) return;
                const ids = (data.questions || []).map(q => q.id);
                if (!ids.length) return;
                window._quizMode = {
                    quizId: parseInt(quizId),
                    quizCode: data.quiz_code || '',
                    title: data.title || '',
                    ids,
                    total: ids.length
                };
                _updateQuizBanner(parseInt(document.getElementById('questionId').textContent));
            } catch (e) { /* non-fatal */ }
        }

        function _updateQuizBanner(currentId) {
            if (!window._quizMode) return;
            const m = window._quizMode;
            const pos = m.ids.indexOf(+currentId);
            const label = [m.quizCode, m.title].filter(Boolean).join(' · ');
            document.getElementById('quizBannerTitle').textContent = label;
            document.getElementById('quizBannerProgress').textContent =
                pos >= 0 ? `${pos + 1} / ${m.total}` : `? / ${m.total}`;
            document.getElementById('quizBanner').classList.add('show');
        }

        function _getNextInQuiz(currentId) {
            const m = window._quizMode;
            if (!m || m.ids.length <= 1) return null;
            const pos = m.ids.indexOf(currentId);
            return m.ids[(pos + 1) % m.total];
        }
        // ─────────────────────────────────────────────────────────────────

        async function initializeQuiz() {
            try {
                // Get initial question ID
                const questionId = document.getElementById('questionId').textContent;

                // Initialize quiz-scoped mode if ?quiz_id= present
                await _initQuizMode();

                // Load the question
                await loadQuestion(questionId, false);
                
                // Setup submit button
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.addEventListener('click', async () => {
                    if (submitBtn.dataset.mode === 'next') {
                        await loadQuestion(submitBtn.dataset.nextId);
                        return;
                    }
                    const container = document.getElementById('questionContainer');
                    const component = container._component;
                    if (!component) return;

                    try { await component.submitAnswer(); } catch (e) { /* ignore */ }

                    // Always switch button to Next mode
                    const currentId = document.getElementById('questionId').textContent.trim();
                    if (window._quizMode) {
                        const nextId = _getNextInQuiz(parseInt(currentId));
                        if (nextId) {
                            submitBtn.textContent = `Next: ${nextId}`;
                            submitBtn.dataset.mode = 'next';
                            submitBtn.dataset.nextId = nextId;
                            submitBtn.disabled = false;
                        }
                    } else {
                        try {
                            const res = await fetch(`/question/api/next-id/${currentId}`);
                            const data = await res.json();
                            if (data.ok) {
                                submitBtn.textContent = `Next: ${data.next_id}`;
                                submitBtn.dataset.mode = 'next';
                                submitBtn.dataset.nextId = data.next_id;
                                submitBtn.disabled = false;
                            } else if (data.all_used) {
                                submitBtn.textContent = 'No unused questions left';
                                submitBtn.disabled = true;
                            }
                        } catch (e) { /* leave as-is */ }
                    }
                });

                document.addEventListener('keydown', async (e) => {
                    if (e.key !== 'Enter') return;
                    const btn = document.getElementById('submitBtn');
                    if (!btn || btn.disabled || btn.style.display === 'none') return;
                    if (btn.dataset.mode === 'next') {
                        await loadQuestion(btn.dataset.nextId);
                        return;
                    }
                    const container = document.getElementById('questionContainer');
                    const component = container._component;
                    if (!component) return;
                    btn.disabled = true;
                    try { await component.submitAnswer(); } catch (e) { /* ignore */ }

                    // Always switch button to Next mode
                    const currentId = document.getElementById('questionId').textContent.trim();
                    if (window._quizMode) {
                        const nextId = _getNextInQuiz(parseInt(currentId));
                        if (nextId) {
                            btn.textContent = `Next: ${nextId}`;
                            btn.dataset.mode = 'next';
                            btn.dataset.nextId = nextId;
                            btn.disabled = false;
                        }
                    } else {
                        try {
                            const res = await fetch(`/question/api/next-id/${currentId}`);
                            const data = await res.json();
                            if (data.ok) {
                                btn.textContent = `Next: ${data.next_id}`;
                                btn.dataset.mode = 'next';
                                btn.dataset.nextId = data.next_id;
                                btn.disabled = false;
                            } else if (data.all_used) {
                                btn.textContent = 'No unused questions left';
                                btn.disabled = true;
                            }
                        } catch (e) { /* leave as-is */ }
                    }
                });
                
                // Show container
                document.querySelector('.container').classList.add('loaded');
                
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('questionContainer').innerHTML = `<div class="template-error">${error.message}</div>`;
                document.querySelector('.container').classList.add('loaded');
            }
        }

        // Start when ready - wait for all scripts to load
        function waitForScripts() {
            if (typeof QuestionTemplates === 'undefined' || typeof UnifiedQuestionComponent === 'undefined') {
                // Scripts not loaded yet, try again in 50ms
                setTimeout(waitForScripts, 50);
            } else {
                // All scripts loaded, start
                initializeQuiz();
            }
        }

        async function setupEventListeners() {
            console.log('setupEventListeners called');
            
            // Duplicate button
            const duplicateLink = document.getElementById('duplicateLink');
            console.log('Duplicate link element:', duplicateLink);
            if (duplicateLink) {
                duplicateLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    const id = document.getElementById('questionId').textContent;
                    console.log('Duplicate clicked, question ID:', id);
                    window.location.href = `/question/duplicate/${id}`;
                });
            }

            // New button
            const newLink = document.getElementById('newLink');
            console.log('New link element:', newLink);
            if (newLink) {
                newLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    console.log('New button clicked');
                    window.location.href = `/question/new`;
                });
            }

            // Next (top bar) — skip to next question without submitting
            document.getElementById('nextTopLink').addEventListener('click', (e) => {
                e.preventDefault();
                const nextId = e.currentTarget.dataset.nextId;
                if (nextId) loadQuestion(nextId);
            });

            // Edit button
            document.getElementById('editLink').addEventListener('click', (e) => {
                e.preventDefault();
                const id = document.getElementById('questionId').textContent;
                window.location.href = `/question/edit/${id}`;
            });

            // JSON button
            document.getElementById('jsonLink').addEventListener('click', (e) => {
                e.preventDefault();
                const container = document.getElementById('questionContainer');
                const component = container._component;
                if (component && component.question) {
                    document.getElementById('jsonContent').textContent = JSON.stringify(component.question, null, 2);
                    document.getElementById('jsonModal').classList.add('show');
                }
            });

            // Close JSON modal
            document.getElementById('closeJsonBtn').addEventListener('click', () => {
                document.getElementById('jsonModal').classList.remove('show');
            });

            // Close modal when clicking outside
            document.getElementById('jsonModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('jsonModal')) {
                    document.getElementById('jsonModal').classList.remove('show');
                }
            });

            // Calculator button — always opens scientific calculator for admin
            document.getElementById('adminCalcBtn').addEventListener('click', () => {
                calculatorController.open({ type: 'scientific', angleMode: 'degrees' });
            });

            // Delete button
            document.getElementById('deleteBtn').addEventListener('click', async () => {
                const id = document.getElementById('questionId').textContent.trim();
                if (!confirm(`Delete question ${id} and its image (if any)? This cannot be undone.`)) return;
                // Capture next ID before deleting
                const nextBtn = document.getElementById('nextTopLink');
                const nextId = nextBtn?.dataset.nextId || null;
                try {
                    const res = await fetch(`/question/api/delete/${id}`, { method: 'POST' });
                    const data = await res.json();
                    if (data.ok) {
                        if (nextId) {
                            await loadQuestion(nextId);
                        } else {
                            window.location.href = '/question/list';
                        }
                    } else {
                        document.getElementById('deleteWarnMsg').textContent = data.error || 'Delete failed';
                        document.getElementById('deleteWarnModal').classList.add('show');
                    }
                } catch (e) {
                    document.getElementById('deleteWarnMsg').textContent = 'Delete failed: ' + e.message;
                    document.getElementById('deleteWarnModal').classList.add('show');
                }
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                console.log('DOM loaded, setting up scripts and event listeners');
                waitForScripts();
                setupEventListeners();
            });
        } else {
            console.log('DOM already loaded, setting up scripts and event listeners');
            waitForScripts();
            setupEventListeners();
        }

        // Handle browser back/forward buttons
        window.addEventListener('popstate', (e) => {
            if (e.state && e.state.questionId) {
                loadQuestion(e.state.questionId, false);
            }
        });

        // Function to load and render a question dynamically
        async function updateTopNext(questionId) {
            const btn = document.getElementById('nextTopLink');
            if (!btn) return;
            if (window._quizMode) { btn.style.display = 'none'; return; }
            try {
                const res = await fetch(`/question/api/next-id/${questionId}`);
                const data = await res.json();
                if (data.ok) {
                    btn.textContent = `Next: ${data.next_id}`;
                    btn.dataset.nextId = data.next_id;
                    btn.style.display = '';
                } else {
                    btn.style.display = 'none';
                }
            } catch (e) {
                btn.style.display = 'none';
            }
        }

        async function loadQuestion(questionId, pushState = true) {
            const container = document.getElementById('questionContainer');
            
            try {
                // Update ID display and URL
                document.getElementById('questionId').textContent = questionId;
                if (pushState) {
                    const qs = window._quizMode ? `?quiz_id=${window._quizMode.quizId}` : '';
                    history.pushState({ questionId }, '', `/question/display/${questionId}${qs}`);
                }
                _updateQuizBanner(questionId);
                
                // Fetch question data
                const response = await fetch(`/question/api/display/${questionId}`);
                if (!response.ok) throw new Error('Failed to fetch question');
                
                const data = await response.json();
                if (!data.ok || !data.question) throw new Error('Invalid question data');
                
                const question = data.question;
                
                // Reset submit button
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.textContent = 'SUBMIT';
                submitBtn.dataset.mode = 'submit';
                submitBtn.dataset.nextId = '';
                submitBtn.disabled = false;

                // Update top-bar next button (fire-and-forget)
                updateTopNext(questionId);

                // Clear and re-render
                container.innerHTML = '';
                
                // Create and render new component
                const component = new UnifiedQuestionComponent({
                    question: question,
                    container: container,
                    readOnly: false
                });
                component.render();
                
                // Store component on container for submit button access
                container._component = component;
                container._component.question = question;
                
                // Scroll to top of container
                container.scrollTop = 0;
            } catch (e) {
                console.error('Error loading question:', e);
                container.innerHTML = `<div style="padding: 20px; color: #c00;">Error loading question: ${e.message}</div>`;
            }
        }

    </script>
    <script>
        document.getElementById('questionContainer').addEventListener('click', function(e) {
            const imgBox = e.target.closest('.template-image');
            if (imgBox) imgBox.classList.toggle('img-expanded');
        });
    </script>
</body>
</html>
