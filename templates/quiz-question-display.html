<!-- 
    Reusable Quiz Question Display Component
    
    Parameters (passed via data attributes):
    - data-mode: 'single', 'preview', 'execution'
    - data-question: JSON stringified question object
    - data-current-index: Current question index (1-based)
    - data-total-questions: Total number of questions
    - data-can-jump: Boolean, whether dropdown navigation is available
    - data-is-locked: Boolean, whether response is locked (post-submit in execution)
    - data-previous-answer: User's answer (execution mode only, after submit)
-->

<div class="quiz-question-display" id="quizQuestionDisplay">
    <!-- Top Band -->
    <div class="top-band">
        <div class="quiz-info">
            <div class="quiz-title" id="quizTitle"></div>
            <div class="quiz-id" id="quizId"></div>
        </div>
        <div class="progress-section">
            <div class="progress-text" id="progressText">Question 1 of 1</div>
            <!-- Question Jump Dropdown (Preview mode only) -->
            <select id="questionJumpSelect" class="question-jump-select" style="display: none;">
                <option value="">Jump to question...</option>
            </select>
        </div>
    </div>

    <!-- Main Content -->
    <div class="question-container">
        <!-- Question Block -->
        <div class="question-block">
            <div class="qa-grid">
                <!-- Stem and Image Section -->
                <div class="qa-left">
                    <div class="stem-band">
                        <div class="question-stem" id="stemContainer"></div>
                    </div>
                    <div class="question-image" id="imageContainer" style="display: none;">
                        <img id="questionImage" alt="Question image">
                    </div>
                </div>

                <!-- Options/Input Section -->
                <div class="qa-right">
                    <div class="options-band">
                        <div class="options-section" id="optionsContainer"></div>
                    </div>
                </div>
            </div>

            <!-- Feedback Section (shown after submit) -->
            <div class="feedback" id="feedbackContainer" style="display: none;"></div>

            <!-- Button Row -->
            <div class="button-row">
                <div class="question-counter" id="questionCounter"></div>
                <button type="button" class="submit-button" id="submitBtn">SUBMIT</button>
                <button type="button" class="next-button" id="nextBtn" style="display: none;">NEXT</button>
                <button type="button" class="close-button" id="closeBtn" style="display: none;">CLOSE</button>
            </div>
        </div>
    </div>
</div>
